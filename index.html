<!DOCTYPE html>
<html lang="th">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>ร้านขายเคสโทรศัพท์</title>
    <style>
        body {
            margin: 0;
            font-family: 'Sarabun', sans-serif;
            background: linear-gradient(to right, #ffe6f0, #e0f7fa);
            color: #333;
        }

        header {
            background-color: #ff4081;
            color: white;
            padding: 20px 0;
            text-align: center;
        }

        nav {
            text-align: center;
            margin-top: 10px;
        }

        nav a {
            margin: 0 15px;
            text-decoration: none;
            color: #ff4081;
            font-weight: bold;
        }

        .hero {
            text-align: center;
            padding: 60px 20px;
            background: url('https://images.unsplash.com/photo-1585386959984-a41552265b40') no-repeat center;
            background-size: cover;
            color: white;
        }

        .hero h1 {
            font-size: 3em;
            margin-bottom: 10px;
        }

        .products {
            display: flex;
            flex-wrap: wrap;
            justify-content: center;
            padding: 40px 20px;
        }

        .product {
            background-color: white;
            border-radius: 12px;
            box-shadow: 0 4px 8px rgba(0,0,0,0.1);
            margin: 20px;
            width: 250px;
            text-align: center;
            padding: 20px;
            transition: transform 0.2s;
        }

        .product:hover {
            transform: scale(1.05);
        }

        .product img {
            max-width: 100%;
            border-radius: 8px;
        }

        .product h3 {
            margin: 10px 0 5px;
            color: #ff4081;
        }

        .product p {
            margin: 0;
            font-size: 14px;
        }

        .btn {
            display: inline-block;
            margin-top: 10px;
            padding: 10px 20px;
            background-color: #ff4081;
            color: white;
            border: none;
            border-radius: 20px;
            text-decoration: none;
        }

        footer {
            text-align: center;
            padding: 20px;
            background-color: #fce4ec;
            margin-top: 40px;
        }
    </style>
</head>
<body>

    <header>
        <h1>💖 เคสมือถือสุดชิค 💖</h1>
        <nav>
            <a href="#">หน้าแรก</a>
            <a href="#">สินค้า</a>
            <a href="#">เกี่ยวกับเรา</a>
            <a href="#">ติดต่อ</a>
        </nav>
    </header>

    <section class="hero">
        <h1>เพิ่มความน่ารักให้มือถือของคุณ!</h1>
        <p>เลือกเคสที่ใช่ สไตล์ที่ชอบ กับราคาสบายกระเป๋า</p>
    </section>

    <section class="products">
        <div class="product">
            <img src="https://images.unsplash.com/photo-1585386954265-3273711b3d03" alt="เคสลายดอกไม้">
            <h3>เคสลายดอกไม้</h3>
            <p>฿150</p>
            <a href="#" class="btn">สั่งซื้อ</a>
        </div>

        <div class="product">
            <img src="https://images.unsplash.com/photo-1603791440384-56cd371ee9a7" alt="เคสสีพาสเทล">
            <h3>เคสสีพาสเทล</h3>
            <p>฿120</p>
            <a href="#" class="btn">สั่งซื้อ</a>
        </div>

        <div class="product">
            <img src="https://images.unsplash.com/photo-1585387071655-6f1aaba552e4" alt="เคสใส">
            <h3>เคสใสกันกระแทก</h3>
            <p>฿180</p>
            <a href="#" class="btn">สั่งซื้อ</a>
        </div>
    </section>

    <footer>
        &copy; 2025 ร้านเคสสุดชิค | โทร: 099-123-4567 | Line: @casecute
    </footer>

</body>
</html>
